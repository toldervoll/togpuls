name: release-macos

on:
  push:
    tags:
      - 'macos-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versjon (uten macos-v-prefiks), f.eks. 0.1.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Bestem versjon
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            tag="${{ inputs.version }}"
          else
            tag="${GITHUB_REF#refs/tags/macos-v}"
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"
          echo "$tag" > macos/VERSION
          echo "Bygger Togpuls $tag"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Installer create-dmg
        run: brew install create-dmg

      - name: Bygg .app
        run: make macos-app MACOS_PY=python3.12

      - name: Ad-hoc-signer og bygg DMG
        run: make macos-dmg MACOS_PY=python3.12

      - name: Hent SHA256
        id: sha
        run: |
          dmg="macos/dist/Togpuls-${{ steps.version.outputs.version }}.dmg"
          sha=$(shasum -a 256 "$dmg" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          echo "DMG: $dmg"
          echo "SHA256: $sha"

      - name: Last opp DMG som artefakt
        uses: actions/upload-artifact@v6
        with:
          name: Togpuls-${{ steps.version.outputs.version }}-dmg
          path: ${{ steps.sha.outputs.dmg }}

      - name: Opprett GitHub Release
        if: startsWith(github.ref, 'refs/tags/macos-v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.sha.outputs.dmg }}
          name: Togpuls ${{ steps.version.outputs.version }}
          body: |
            ## Togpuls ${{ steps.version.outputs.version }}

            **DMG SHA256:** `${{ steps.sha.outputs.sha256 }}`

            ### Anbefalt: Homebrew

            ```
            brew tap kengu/togpuls https://github.com/kengu/togpuls
            brew trust kengu/togpuls
            brew install --cask togpuls
            ```

            Senere oppdatering: `brew upgrade --cask togpuls`.

            ### Eller direkte DMG

            Last ned `Togpuls-${{ steps.version.outputs.version }}.dmg`
            nedenfor og dra Togpuls til Applications. Følg
            [togpuls.kengu.no/install](https://togpuls.kengu.no/install)
            for det engangs-Privacy-steget.

            > Appen er ad-hoc-signert, ikke notarisert. Homebrew-postflighten
            > fjerner quarantine automatisk; direkte DMG-install krever ett
            > ekstra trinn i Systeminnstillinger.

      - name: Auto-bump Casks/togpuls.rb
        if: startsWith(github.ref, 'refs/tags/macos-v')
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          set -eu

          # Bytt til main slik at vi committer på en navngitt branch, ikke
          # på tag-commit-en (detached HEAD).
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          # Sed-bytt version og sha256 i Casks/togpuls.rb.
          sed -i.bak -E "s|version \"[^\"]+\"|version \"$VERSION\"|" Casks/togpuls.rb
          sed -i.bak -E "s|sha256 \"[a-f0-9]+\"|sha256 \"$SHA256\"|" Casks/togpuls.rb
          rm -f Casks/togpuls.rb.bak

          # Stopp pent hvis cask allerede er på riktig versjon
          # (f.eks. workflow_dispatch re-run).
          if git diff --quiet Casks/togpuls.rb; then
            echo "Cask er allerede $VERSION — ingenting å committe."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/togpuls.rb
          git commit -m "Cask: bump til $VERSION (auto)

          Auto-bump fra release-workflowen for macos-v$VERSION.
          DMG SHA256: $SHA256"
          git push origin main
