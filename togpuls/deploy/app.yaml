# DigitalOcean App Platform app spec for togpuls.
# Usage: doctl apps create --spec togpuls/deploy/app.yaml
# or paste into the App Platform UI ("Edit App Spec").
name: togpuls
region: ams
domains:
  - domain: togpuls.kengu.no
    type: PRIMARY
  # Apex kengu.no hostes ikke her; den brukes kun til å redirecte til
  # www.kengu.no (som serveres fra Cloudflare Pages). DigitalOcean DNS kan
  # ikke CNAME-e apex selv, så denne appen står for redirecten. App Platform
  # oppretter apex-DNS-recorden automatisk siden sonen ligger på DO.
  - domain: kengu.no
    type: ALIAS
ingress:
  rules:
    # Treffer kun host kengu.no -> 301 til www. togpuls.kengu.no er upåvirket.
    - match:
        authority:
          exact: kengu.no
        path:
          prefix: /
      redirect:
        authority: www.kengu.no
        scheme: https
        redirect_code: 301
    # Alt annet (togpuls.kengu.no) går til web-komponenten som før.
    - match:
        path:
          prefix: /
      component:
        name: web
services:
  - name: web
    dockerfile_path: togpuls/Dockerfile
    source_dir: /
    github:
      repo: kengu/togpuls
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /api/v1/health
      initial_delay_seconds: 5
      period_seconds: 30
    envs:
      - key: TOGPULS_PORT
        value: "8000"
